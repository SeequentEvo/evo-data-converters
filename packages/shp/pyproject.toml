[project]
name = "evo-data-converters-shp"
version = "0.1.0"
description = "Python data converters for ESRI shapefiles to Evo geoscience objects."
readme = "README.md"
authors = [
    { name = "Seequent", email = "support@seequent.com" }
]
requires-python = ">=3.10"
dependencies = [
    "evo-data-converters-common",
    "evo-schemas>=2025.12.15",
    "pyarrow>=21.0.0",
    "pyshp>=3.0.3",
]

[project.urls]
Source = "https://github.com/SeequentEvo/evo-data-converters"
Tracker = "https://github.com/SeequentEvo/evo-data-converters/issues"
Homepage = "https://www.seequent.com/"
Documentation = "https://developer.seequent.com/"

[dependency-groups]
dev = [
    "pytest"
]

[tool.ruff]
src = ["src", "tests"]
line-length = 120

[project.scripts]
evo-data-converters-shp = "evo_data_converters_shp:main"

[build-system]
requires = ["hatchling", "hatch-fancy-pypi-readme"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/evo"]

[tool.uv.sources]
evo-data-converters-common = { workspace = true }

[tool.hatch.metadata.hooks.fancy-pypi-readme]
content-type = "text/markdown"

[[tool.hatch.metadata.hooks.fancy-pypi-readme.fragments]]
path = "README.md"

[[tool.hatch.metadata.hooks.fancy-pypi-readme.substitutions]]
# Literal TOML strings (single quotes) need no escaping of backslashes.
# Converts relative links to absolute links in PyPI
pattern = '\[(.+?)\]\(((?!https?://)\S+?)\)'
replacement = '[\1](https://github.com/SeequentEvo/evo-data-converters/tree/main/packages/image/\g<2>)'
